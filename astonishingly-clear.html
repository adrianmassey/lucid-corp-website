<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astonishingly clear — Lucid Corp</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #000000;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ─── SECTION ─────────────────────────────────────── */
  .clear-section {
    max-width: 1500px;
    margin: 0 auto;
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(380px, 0.85fr) 1.15fr;
    align-items: center;
    gap: 40px;
    padding: 80px clamp(24px, 5vw, 80px);
  }

  /* ── Left: copy ── */
  .clear-copy { max-width: 560px; }
  .clear-copy h2 {
    font-size: clamp(56px, 7vw, 110px);
    line-height: 0.95;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: #ffffff;
  }
  .clear-copy p {
    margin-top: 28px;
    font-size: clamp(18px, 1.5vw, 24px);
    line-height: 1.45;
    font-weight: 400;
    color: rgba(255,255,255,0.62);
    max-width: 460px;
  }

  /* ── Stat pill ── */
  .stat-pill {
    margin-top: 40px;
    display: inline-flex;
    align-items: baseline;
    gap: 14px;
    padding: 22px 34px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .stat-pill .stat-num {
    font-size: clamp(34px, 3.5vw, 46px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #ffffff;
    line-height: 1;
  }
  .stat-pill .stat-label {
    font-size: clamp(16px, 1.3vw, 19px);
    font-weight: 400;
    color: rgba(255,255,255,0.55);
  }

  /* ── Right: exploded product ── */
  .clear-visual {
    position: relative;
    height: 80vh;
    min-height: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .explode-stage {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 1 / 1;
  }
  .explode-stage img {
    position: absolute;
    left: 50%;
    width: 78%;
    transform: translateX(-50%);
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.65));
    transition: top 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                opacity 0.7s ease;
  }
  /* resting (collapsed) positions */
  .layer-insert { top: 44%; z-index: 2; }
  .layer-tray   { top: 50%; z-index: 1; }

  /* exploded positions — applied when in view */
  .explode-stage.exploded .layer-insert { top: 18%; }
  .explode-stage.exploded .layer-tray   { top: 56%; }

  /* floating label callouts */
  .callout {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s;
    white-space: nowrap;
  }
  .explode-stage.exploded .callout { opacity: 1; transform: translateY(0); }
  .callout .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ffffff; flex-shrink: 0;
  }
  .callout .line {
    width: 46px; height: 1px; background: rgba(255,255,255,0.25);
  }
  .callout-insert { top: 24%; left: 4%; }
  .callout-tray   { bottom: 22%; right: 2%; flex-direction: row-reverse; }

  /* ─── RESPONSIVE ─────────────────────────────────────── */
  @media (max-width: 900px) {
    .clear-section {
      grid-template-columns: 1fr;
      text-align: center;
      gap: 20px;
      padding: 64px 24px;
    }
    .clear-copy { max-width: 100%; margin: 0 auto; }
    .clear-copy p { margin-left: auto; margin-right: auto; }
    .clear-visual { height: 60vh; min-height: 420px; order: 2; }
    .callout { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .explode-stage img, .callout { transition: none; }
  }
</style>
</head>
<body>

  <section class="clear-section">
    <div class="clear-copy">
      <h2>Astonishingly<br>clear</h2>
      <p>Every tray is thoughtfully engineered from the inside out — crystal-clear clarity that lets the food speak for itself.</p>
      <div class="stat-pill">
        <span class="stat-num">100%</span>
        <span class="stat-label">recyclable, crystal-clear rPET</span>
      </div>
    </div>

    <div class="clear-visual">
      <div class="explode-stage" id="stage">
        <img class="layer-insert" src="assets/2 piece tray (Parallax)/Black Parallax Trays/Tray Insert.png" alt="Tray insert">
        <img class="layer-tray" src="assets/2 piece tray (Parallax)/Black Parallax Trays/Main Tray.png" alt="Base tray">

        <div class="callout callout-insert">
          <span class="dot"></span>
          <span class="line"></span>
          <span>Vented insert</span>
        </div>
        <div class="callout callout-tray">
          <span class="dot"></span>
          <span class="line"></span>
          <span>Leak-resistant base</span>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Trigger the exploded view when the section scrolls into view
    const stage = document.getElementById('stage');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) stage.classList.add('exploded');
      });
    }, { threshold: 0.4 });
    io.observe(stage);
  </script>

</body>
</html>
